[pytest]
# Pytest configuration

# Minimum version
minversion = 7.0

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --cov=billing_app
    --cov-report=html
    --cov-report=term-missing

# Test paths
testpaths = tests

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    api: API endpoint tests
    validators: Validator tests
    immutability: Immutability tests
    signature: Signature tests
    saft: SAF-T XML tests
    slow: Slow tests
