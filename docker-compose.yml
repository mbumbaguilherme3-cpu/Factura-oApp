version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: billing_agt_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-billing_agt}
      POSTGRES_USER: ${POSTGRES_USER:-billing}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secure_password_change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-billing}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - billing_network

  flask-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: billing_agt_app
    environment:
      FLASK_ENV: ${FLASK_ENV:-development}
      DATABASE_URL: ${DATABASE_URL:-postgresql://billing:secure_password_change_me@db:5432/billing_agt}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5000}
      HOST: 0.0.0.0
      PORT: 5000
      DEBUG: ${DEBUG:-False}
    volumes:
      - ./billing_app:/app/billing_app
      - ./alembic:/app/alembic
      - ./tests:/app/tests
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    command: >
      sh -c "alembic upgrade head &&
             flask run --host=0.0.0.0"
    networks:
      - billing_network
    stdin_open: true
    tty: true

  redis:
    image: redis:7-alpine
    container_name: billing_agt_cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - billing_network
    command: redis-server --appendonly yes

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  billing_network:
    driver: bridge
